<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nameera Arcade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --primary: #45f3ff;
            --primary-glow: rgba(69, 243, 255, 0.5);
            --secondary: #ff2a7a;
            --surface: rgba(255, 255, 255, 0.05);
            --surface-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: #a0a5b1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Animated Dark Background with glowing orbs */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a1c29 0%, #0b0c10 100%);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 20s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: #45f3ff;
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: #ff2a7a;
            bottom: -200px;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(50px, 50px) scale(1.2);
            }

            100% {
                transform: translate(-30px, 80px) scale(0.9);
            }
        }

        header {
            width: 100%;
            padding: 4rem 2rem 2rem;
            text-align: center;
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            text-shadow: 0 0 40px rgba(255, 42, 122, 0.3);
        }

        p.subtitle {
            font-size: 1.2rem;
            color: var(--text-dim);
            font-weight: 300;
            max-width: 600px;
            margin: 0 auto;
        }

        main {
            width: 100%;
            max-width: 1200px;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            width: 100%;
        }

        .game-card {
            background: var(--surface);
            border: 1px solid var(--surface-border);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            position: relative;
            text-decoration: none;
            color: var(--text);
        }

        .game-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(69, 243, 255, 0.4);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5),
                0 0 20px var(--primary-glow);
        }

        .card-img-wrapper {
            width: 100%;
            height: 220px;
            overflow: hidden;
            position: relative;
        }

        .card-img-wrapper::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(to top, rgba(11, 12, 16, 1), transparent);
        }

        .game-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .game-card:hover img {
            transform: scale(1.1);
        }

        .card-content {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        .card-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .card-desc {
            color: var(--text-dim);
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }

        .play-btn {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            display: inline-block;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .play-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--primary);
            transition: all 0.3s ease;
            z-index: -1;
        }

        .game-card:hover .play-btn {
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .game-card:hover .play-btn::before {
            left: 0;
        }

        /* Tags */
        .tags {
            display: flex;
            gap: 0.5rem;
            position: absolute;
            top: 1rem;
            right: 1rem;
            z-index: 2;
        }

        .tag {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            border: 1px solid var(--secondary);
            color: #fff;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tag.new {
            background: rgba(255, 42, 122, 0.2);
        }
    </style>
</head>

<body>

    <div class="ambient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <header>
        <h1>NEXT ERA </h1>
        <p class="subtitle">A collection of handcrafted arcade and web experiences. Dive into the retro-inspired worlds.
        </p>
    </header>

    <main>
        <div class="games-grid">
            <a href="RUDIBUDI.html.html" class="game-card">
                <div class="tags">
                    <span class="tag new">Boss Rush</span>
                </div>
                <div class="card-img-wrapper">
                    <img src="rudibudi_thumbnail.png" alt="Rudibudi gameplay screenshot thumbnail">
                </div>
                <div class="card-content">
                    <h2 class="card-title">RUDIBUDI</h2>
                    <p class="card-desc">Jump, dodge, and fight your way through challenging levels to face the mighty
                        Dark Lord. An intense 2D boss-rush platformer with chiptune audio and enrage mode!</p>
                    <div class="play-btn">Play Now</div>
                </div>
            </a>
        </div>
    </main>

</body>

</html>
